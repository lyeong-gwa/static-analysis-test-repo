spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/inquiry_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: dev-secret-key-for-jwt-token-generation
  expiration: 86400000

server:
  port: 8080
